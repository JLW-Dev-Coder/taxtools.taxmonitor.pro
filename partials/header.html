<!-- partials/header.html -->
<header class="bg-white border-b border-gray-100 sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">

    <!-- Logo -->
    <a href="/index.html" class="flex items-center gap-2">
      <div class="w-10 h-10 bg-navy rounded-full flex items-center justify-center">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
      </div>
      <span class="font-bold text-xl text-navy">TaxTools</span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex items-center gap-6">
      <a href="/index.html" class="text-charcoal hover:text-navy transition-colors font-medium">Home</a>
      <a href="/index.html#tools" class="text-charcoal hover:text-navy transition-colors font-medium">Tools</a>
      <a href="/about.html" class="text-charcoal hover:text-navy transition-colors font-medium">About</a>
      <a href="/faq.html" class="text-charcoal hover:text-navy transition-colors font-medium">FAQ</a>
      <a href="/help-center.html" class="text-charcoal hover:text-navy transition-colors font-medium">Help Center</a>
      <a href="/support.html" class="text-charcoal hover:text-navy transition-colors font-medium">Contact</a>

      <button id="cart-btn" class="relative p-2 hover:bg-gray-100 rounded-lg transition-colors" aria-label="Cart" type="button">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-warm text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold hidden">0</span>
      </button>
    </nav>

    <!-- Mobile menu button -->
    <button id="mobile-menu-btn" class="md:hidden p-2 hover:bg-gray-100 rounded-lg" aria-label="Open menu" type="button">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </div>

  <!-- Mobile menu -->
  <div id="mobile-menu" class="md:hidden hidden border-t border-gray-100 bg-white">
    <div class="px-4 py-3 space-y-2">
      <a href="/index.html" class="block py-2 text-charcoal hover:text-navy font-medium">Home</a>
      <a href="/index.html#tools" class="block py-2 text-charcoal hover:text-navy font-medium">Tools</a>
      <a href="/about.html" class="block py-2 text-charcoal hover:text-navy font-medium">About</a>
      <a href="/faq.html" class="block py-2 text-charcoal hover:text-navy font-medium">FAQ</a>
      <a href="/help-center.html" class="block py-2 text-charcoal hover:text-navy font-medium">Help Center</a>
      <a href="/support.html" class="block py-2 text-charcoal hover:text-navy font-medium">Contact</a>

      <button type="button" onclick="openCart()" class="block w-full text-left py-2 text-charcoal hover:text-navy font-medium">
        Cart (<span class="mobile-cart-count">0</span>)
      </button>
    </div>
  </div>
</header>
