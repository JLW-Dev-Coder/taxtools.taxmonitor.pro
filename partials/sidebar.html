<!-- partials/sidebar.html -->
<aside class="hidden lg:block lg:w-72 xl:w-80">
  <div class="sticky top-24">

    <!-- Player Card -->
    <div class="rounded-2xl border border-blue-900/40 bg-blue-950/10 p-5 text-white shadow-2xl">
      <div class="flex items-center justify-between gap-3">
        <div>
          <div class="text-xs font-semibold uppercase tracking-wide text-blue-300">Player</div>
          <div id="sidebar-player" class="mt-1 text-sm font-semibold text-white">Signed in</div>
        </div>
        <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-blue-500 to-blue-600 text-navy font-bold">TM</div>
      </div>

      <div class="mt-4 grid grid-cols-2 gap-3">
        <div class="rounded-xl border border-blue-900/40 bg-navy/40 p-3">
          <div class="text-[11px] font-semibold uppercase tracking-wide text-blue-300">Tokens</div>
          <div id="sidebar-token-balance" class="mt-1 text-lg font-bold text-white">—</div>
        </div>
        <div class="rounded-xl border border-blue-900/40 bg-navy/40 p-3">
          <div class="text-[11px] font-semibold uppercase tracking-wide text-blue-300">Streak</div>
          <div id="sidebar-streak" class="mt-1 text-lg font-bold text-white">—</div>
        </div>
      </div>

      <p id="sidebar-status" class="mt-4 text-xs text-blue-300">Ready.</p>

      <div class="mt-4 grid gap-2">
        <!-- Alphabetical -->
        <a href="/index.html#games" class="inline-flex items-center justify-center rounded-lg bg-gradient-to-r from-blue-500 to-blue-600 px-4 py-2 text-sm font-semibold text-white hover:from-blue-400 hover:to-blue-500 transition">Browse games</a>
        <a href="/help-center.html" class="inline-flex items-center justify-center rounded-lg border border-blue-900/60 bg-blue-950/10 px-4 py-2 text-sm font-semibold text-blue-100 hover:bg-blue-950/20 transition">Help Center</a>
      </div>

      <div class="mt-4 h-px w-full bg-blue-900/40"></div>

      <div class="mt-4">
        <div class="text-xs font-semibold uppercase tracking-wide text-blue-300">Quick actions</div>
        <div class="mt-2 grid gap-2">
          <!-- Alphabetical -->
          <button id="sidebar-open-cart" type="button" class="inline-flex items-center justify-between rounded-lg border border-blue-900/60 bg-blue-950/10 px-4 py-2 text-sm font-semibold text-blue-100 hover:bg-blue-950/20 transition">
            <span>Cart</span>
            <span class="text-blue-300">→</span>
          </button>
          <a href="https://taxmonitor.pro" class="inline-flex items-center justify-between rounded-lg border border-blue-900/60 bg-blue-950/10 px-4 py-2 text-sm font-semibold text-blue-100 hover:bg-blue-950/20 transition">
            <span>Get real help</span>
            <span class="text-blue-300">→</span>
          </a>
        </div>
      </div>
    </div>

    <!-- Search + Filters -->
    <div class="mt-6 rounded-2xl border border-blue-900/40 bg-blue-950/10 p-5 text-white">
      <div class="text-xs font-semibold uppercase tracking-wide text-blue-300">Find a game</div>

      <label class="mt-3 block">
        <span class="sr-only">Search games</span>
        <input
          id="sidebar-search"
          type="search"
          inputmode="search"
          autocomplete="off"
          placeholder="Search…"
          class="w-full rounded-lg border border-blue-900/40 bg-navy/50 px-3 py-2 text-sm text-white placeholder:text-blue-300/70 focus:outline-none focus:ring-2 focus:ring-blue-500/40"
        />
      </label>

      <div class="mt-4">
        <div class="text-xs font-semibold uppercase tracking-wide text-blue-300">Categories</div>
        <div class="mt-2 grid gap-2">
          <!-- Alphabetical -->
          <button data-filter="all" type="button" class="sidebar-filter inline-flex items-center justify-between rounded-lg border border-blue-900/60 bg-blue-950/10 px-4 py-2 text-sm font-semibold text-blue-100 hover:bg-blue-950/20 transition">
            <span>All</span><span class="text-blue-300">→</span>
          </button>
          <button data-filter="compliance" type="button" class="sidebar-filter inline-flex items-center justify-between rounded-lg border border-blue-900/60 bg-blue-950/10 px-4 py-2 text-sm font-semibold text-blue-100 hover:bg-blue-950/20 transition">
            <span>Compliance</span><span class="text-blue-300">→</span>
          </button>
          <button data-filter="payments" type="button" class="sidebar-filter inline-flex items-center justify-between rounded-lg border border-blue-900/60 bg-blue-950/10 px-4 py-2 text-sm font-semibold text-blue-100 hover:bg-blue-950/20 transition">
            <span>Payments</span><span class="text-blue-300">→</span>
          </button>
          <button data-filter="transcripts" type="button" class="sidebar-filter inline-flex items-center justify-between rounded-lg border border-blue-900/60 bg-blue-950/10 px-4 py-2 text-sm font-semibold text-blue-100 hover:bg-blue-950/20 transition">
            <span>Transcripts</span><span class="text-blue-300">→</span>
          </button>
        </div>
        <p class="mt-2 text-xs text-blue-300">These are UI filters only (no API calls in the sidebar partial).</p>
      </div>
    </div>

    <!-- Keep it light: one nudge, not a novel -->
    <div class="mt-6 rounded-2xl border border-blue-900/40 bg-blue-950/10 p-5 text-white">
      <div class="flex items-start justify-between gap-3">
        <div>
          <div class="text-xs font-semibold uppercase tracking-wide text-blue-300">Tip</div>
          <div class="mt-1 text-sm text-blue-100">Short games win. Pick one, finish it, repeat.</div>
        </div>
        <span class="text-blue-300">★</span>
      </div>
    </div>

  </div>

  <script>
    (function () {
      // Sidebar is presentation-first. No API calls here.
      // Pages can optionally wire these IDs to their own logic.

      var openCartBtn = document.getElementById('sidebar-open-cart');
      openCartBtn && openCartBtn.addEventListener('click', function () {
        // Avoid hard dependency. If the page defines openCart(), call it.
        if (typeof window.openCart === 'function') window.openCart();
      });

      // Dispatch events for host pages to handle (search + filter).
      var search = document.getElementById('sidebar-search');
      search && search.addEventListener('input', function () {
        var ev = new CustomEvent('tm:sidebar:search', { detail: { q: String(search.value || '') } });
        document.dispatchEvent(ev);
      });

      var filters = Array.prototype.slice.call(document.querySelectorAll('.sidebar-filter'));
      filters.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var key = String(btn.getAttribute('data-filter') || 'all');
          var ev = new CustomEvent('tm:sidebar:filter', { detail: { key: key } });
          document.dispatchEvent(ev);
        });
      });
    })();
  </script>
</aside>
