<!-- partials/topbar.html -->
<div class="border-b border-blue-900/40 bg-navy/60 text-white">
  <div class="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-3 px-6 py-3">

    <!-- Left: Context -->
    <div class="flex items-center gap-3">
      <div class="hidden sm:flex items-center gap-2 text-xs text-blue-300">
        <a href="/index.html" class="hover:text-white transition">Home</a>
        <span class="opacity-60">/</span>
        <span id="topbar-context" class="text-blue-200">Games</span>
      </div>

      <div class="sm:hidden text-xs text-blue-300">
        <span id="topbar-context-mobile" class="text-blue-200">Games</span>
      </div>

      <span class="hidden md:inline-flex items-center rounded-full border border-blue-900/50 bg-blue-950/10 px-3 py-1 text-xs font-semibold text-blue-200">
        Educational only
      </span>
    </div>

    <!-- Right: Player + Tokens + Actions -->
    <div class="flex items-center gap-3">
      <div class="hidden md:flex items-center gap-2 rounded-xl border border-blue-900/40 bg-blue-950/10 px-3 py-2">
        <span class="text-xs font-semibold text-blue-300">Tokens</span>
        <span id="topbar-token-balance" class="text-sm font-bold text-white">—</span>
      </div>

      <div class="hidden lg:flex items-center gap-2 rounded-xl border border-blue-900/40 bg-blue-950/10 px-3 py-2">
        <span class="text-xs font-semibold text-blue-300">Status</span>
        <span id="topbar-status" class="text-xs text-blue-200">Checking session…</span>
      </div>

      <!-- Actions (alphabetical) -->
      <button id="topbar-cart" type="button" class="inline-flex items-center justify-center rounded-lg border border-blue-900/50 bg-blue-950/10 px-3 py-2 text-sm font-semibold text-blue-100 hover:bg-blue-950/20 transition" aria-label="Open cart">
        Cart
        <span id="topbar-cart-count" class="ml-2 hidden rounded-full bg-blue-500 px-2 py-0.5 text-xs font-bold text-white">0</span>
      </button>

      <button id="topbar-signin" type="button" class="inline-flex items-center justify-center rounded-lg bg-gradient-to-r from-blue-500 to-blue-600 px-3 py-2 text-sm font-semibold text-white hover:from-blue-400 hover:to-blue-500 transition">
        Sign in
      </button>

      <button id="topbar-signout" type="button" class="hidden inline-flex items-center justify-center rounded-lg border border-blue-900/50 bg-blue-950/10 px-3 py-2 text-sm font-semibold text-blue-100 hover:bg-blue-950/20 transition">
        Sign out
      </button>
    </div>

  </div>

  <!-- Small-screen: status row -->
  <div class="mx-auto max-w-7xl px-6 pb-3 md:hidden">
    <p id="topbar-status-mobile" class="text-xs text-blue-300">Checking session…</p>
  </div>
</div>

<script>
  (function () {
    // Topbar is UI-only. No API calls here.
    // Pages can wire session/balance updates by setting these elements.

    var cartBtn = document.getElementById('topbar-cart');
    var signinBtn = document.getElementById('topbar-signin');
    var signoutBtn = document.getElementById('topbar-signout');

    function dispatch(name, detail) {
      try {
        document.dispatchEvent(new CustomEvent(name, { detail: detail || {} }));
      } catch (e) {
        // CustomEvent support is fine in modern browsers, but we fail silently.
      }
    }

    cartBtn && cartBtn.addEventListener('click', function () {
      if (typeof window.openCart === 'function') return window.openCart();
      dispatch('tm:topbar:cart');
    });

    signinBtn && signinBtn.addEventListener('click', function () {
      // Canonical entry point per your standard
      window.location.href = '/index.html';
    });

    signoutBtn && signoutBtn.addEventListener('click', function () {
      dispatch('tm:topbar:signout');
    });

    // Optional helper: host pages may call window.tmTopbarSetAuth(true/false)
    window.tmTopbarSetAuth = function (isAuthed) {
      var authed = !!isAuthed;
      if (signinBtn) signinBtn.classList.toggle('hidden', authed);
      if (signoutBtn) signoutBtn.classList.toggle('hidden', !authed);
    };

    // Optional helper: host pages may call window.tmTopbarSetStatus('...')
    window.tmTopbarSetStatus = function (msg) {
      var s1 = document.getElementById('topbar-status');
      var s2 = document.getElementById('topbar-status-mobile');
      if (s1) s1.textContent = String(msg || '');
      if (s2) s2.textContent = String(msg || '');
    };

    // Optional helper: host pages may call window.tmTopbarSetTokens(123)
    window.tmTopbarSetTokens = function (n) {
      var el = document.getElementById('topbar-token-balance');
      if (el) el.textContent = (n === 0 || n) ? String(n) : '—';
    };

    // Optional helper: host pages may call window.tmTopbarSetCartCount(0..)
    window.tmTopbarSetCartCount = function (n) {
      var badge = document.getElementById('topbar-cart-count');
      if (!badge) return;
      var num = Number(n);
      var show = Number.isFinite(num) && num > 0;
      badge.textContent = show ? String(num) : '0';
      badge.classList.toggle('hidden', !show);
    };

    // Default state
    window.tmTopbarSetAuth(false);
  })();
</script>
