<!-- games/tax-jargon-game.html -->
<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tax Jargon Game • Play • TaxTools Arcade</title>

  <!-- Canonical local assets (required) -->
  <link rel="icon" href="/assets/favicon.ico" />
  <link rel="stylesheet" href="/styles/site.css" />

  <!-- SDKs (required) -->
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>

  <!-- Remote UI helpers allowed if local CSS does not provide them -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }

    .badge-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .bounce-in { animation: bounce-in 0.5s ease-out; }
    .confetti { animation: confetti 3s ease-out forwards; }
    .drag-item { cursor: grab; touch-action: none; }
    .drag-item:active { cursor: grabbing; }
    .drop-zone { transition: all 0.2s ease; }
    .drop-zone.drag-over { background: rgba(59,130,246,0.08); border-color:#3b82f6; transform:scale(1.02); }
    .flip-card { perspective:1000px; }
    .flip-card-back { transform:rotateY(180deg); }
    .flip-card-front, .flip-card-back { backface-visibility:hidden; -webkit-backface-visibility:hidden; }
    .flip-card-inner { transition:transform 0.6s; transform-style:preserve-3d; }
    .flip-card.flipped .flip-card-inner { transform:rotateY(180deg); }
    .shake { animation:shake 0.3s ease-in-out; }

    @keyframes bounce-in {
      0% { transform:scale(0); opacity:0; }
      50% { transform:scale(1.1); }
      100% { transform:scale(1); opacity:1; }
    }

    @keyframes confetti {
      0% { transform:translateY(-100%) rotate(0deg); opacity:1; }
      100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
    }

    @keyframes pulse-glow {
      0%,100% { box-shadow:0 0 20px rgba(34,197,94,0.25); }
      50% { box-shadow:0 0 40px rgba(34,197,94,0.45); }
    }

    @keyframes shake {
      0%,100% { transform:translateX(0); }
      25% { transform:translateX(-5px); }
      75% { transform:translateX(5px); }
    }
  </style>
</head>

<body class="h-full bg-gradient-to-br from-slate-50 via-white to-blue-50 text-slate-900">

  <!-- PARTIAL:header -->

  <main class="mx-auto max-w-5xl px-6 py-10">

    <section class="space-y-2">
      <h1 class="text-3xl font-extrabold tracking-tight">Tax Jargon Game</h1>
      <p class="text-slate-600">Access is verified server-side.</p>
      <div class="text-sm text-slate-500">
        <span id="status">Checking access…</span>
      </div>
    </section>

    <!-- REQUIRED APP WRAPPER -->
    <div id="app" class="h-full w-full overflow-auto custom-scrollbar">

      <!-- Home Screen -->
      <div id="home-screen" class="hidden min-h-full p-2 md:p-4">
        <div class="max-w-2xl mx-auto">

          <div class="text-center mb-8 pt-4">
            <div class="inline-flex items-center gap-2 bg-emerald-100 text-emerald-700 px-4 py-1.5 rounded-full text-sm font-medium mb-4">
              <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
              <span id="player-email">player@example.com</span>
            </div>

            <h2 id="main-title" class="text-3xl md:text-4xl font-extrabold text-slate-800 mb-2">
              Tax Jargon Game:
              <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-500 to-blue-500">Can You Master Tax Terms?</span>
            </h2>

            <p id="main-subtitle" class="text-slate-500 text-lg">Play quizzes, flashcards, and lightning rounds.</p>
          </div>

          <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="bg-white rounded-xl p-4 text-center shadow-sm border border-slate-100">
              <div class="text-2xl font-bold text-emerald-500" id="stat-terms">0</div>
              <div class="text-xs text-slate-500">Terms Learned</div>
            </div>
            <div class="bg-white rounded-xl p-4 text-center shadow-sm border border-slate-100">
              <div class="text-2xl font-bold text-blue-500" id="stat-quizzes">0</div>
              <div class="text-xs text-slate-500">Quizzes Done</div>
            </div>
            <div class="bg-white rounded-xl p-4 text-center shadow-sm border border-slate-100">
              <div class="text-2xl font-bold text-amber-500" id="stat-badges">0</div>
              <div class="text-xs text-slate-500">Badges</div>
            </div>
          </div>

          <div class="space-y-3">

            <button onclick="startFlashcards()" class="w-full bg-white hover:bg-slate-50 rounded-2xl p-5 flex items-center gap-4 shadow-sm border border-slate-100">
              <div class="flex-1 text-left">
                <div class="font-bold text-slate-800 text-lg">Flashcards</div>
                <div class="text-slate-500 text-sm">Flip to learn definitions</div>
              </div>
            </button>

            <button onclick="startQuiz()" class="w-full bg-white hover:bg-slate-50 rounded-2xl p-5 flex items-center gap-4 shadow-sm border border-slate-100">
              <div class="flex-1 text-left">
                <div class="font-bold text-slate-800 text-lg">Start Quiz</div>
                <div class="text-slate-500 text-sm">Multiple-choice questions</div>
              </div>
            </button>

            <button onclick="startLightning()" class="w-full bg-white hover:bg-slate-50 rounded-2xl p-5 flex items-center gap-4 shadow-sm border border-slate-100">
              <div class="flex-1 text-left">
                <div class="font-bold text-slate-800 text-lg">Lightning Round</div>
                <div class="text-slate-500 text-sm">10 questions in 60 seconds</div>
              </div>
            </button>

            <button onclick="startIRSGame()" class="w-full bg-white hover:bg-slate-50 rounded-2xl p-5 flex items-center gap-4 shadow-sm border border-slate-100">
              <div class="flex-1 text-left">
                <div class="font-bold text-slate-800 text-lg">IRS Code Mini‑Game</div>
                <div class="text-slate-500 text-sm">Match notice codes</div>
              </div>
            </button>

            <button onclick="showProgress()" class="w-full bg-white hover:bg-slate-50 rounded-2xl p-5 flex items-center gap-4 shadow-sm border border-slate-100">
              <div class="flex-1 text-left">
                <div class="font-bold text-slate-800 text-lg">Progress</div>
                <div class="text-slate-500 text-sm">Achievements and scores</div>
              </div>
            </button>

          </div>

        </div>
      </div>

    </div>

  </main>

  <!-- PARTIAL:footer -->

  <script>

  /* ===== Required constants ===== */

  const API_BASE = "https://tools-api.taxmonitor.pro";
  const GAME_SLUG = "tax-jargon-game";
  const GAME_FILE = "tax-jargon-game.html";
  const ABOUT_URL = "/about-games/" + GAME_FILE;


  /* ===== Helpers ===== */

  function setStatus(message) {
    const el = document.getElementById("status");
    if (el) el.textContent = message || "";
  }


  async function safeJson(res) {
    try {
      const ct = (res.headers.get("content-type") || "").toLowerCase();
      if (!ct.includes("application/json")) return {};
      return await res.json();
    } catch {
      return {};
    }
  }


  async function apiGet(path) {
    const res = await fetch(API_BASE + path, {
      method: "GET",
      credentials: "include"
    });

    const json = await safeJson(res);

    return { res, json };
  }


  function redirectToAbout() {
    window.location.href = ABOUT_URL;
  }


  async function endRun(result) {
    await fetch(API_BASE + "/v1/games/end", {
      method: "POST",
      credentials: "include",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ result, slug: GAME_SLUG })
    }).catch(() => {});
  }


  /* ===== Access Gate ===== */

  async function gateAccess() {

    setStatus("Checking session…");

    const me = await apiGet("/v1/auth/me");

    if (!me.res.ok || !me.json || me.json.isAuthenticated === false) {
      redirectToAbout();
      return false;
    }


    setStatus("Loading token balance…");

    await apiGet("/v1/tokens/balance");


    setStatus("Verifying access…");

    const access = await apiGet("/v1/games/access?slug=" + encodeURIComponent(GAME_SLUG));

    if (!access.res.ok || !access.json || access.json.allowed !== true) {
      redirectToAbout();
      return false;
    }


    setStatus("Access granted.");

    window.__playerEmail = me.json.email || me.json.user?.email || "player";

    return true;
  }


  /* ===== Boot Sequence ===== */

  (async () => {

    const ok = await gateAccess();

    if (!ok) return;

    initializeApp();

  })().catch(() => {

    setStatus("Error loading game. Redirecting…");

    redirectToAbout();

  });


  /* ===== Minimal Game Initialization ===== */

  function initializeApp() {

    const email = window.__playerEmail || "player";

    const emailEl = document.getElementById("player-email");

    if (emailEl) emailEl.textContent = email;


    if (window.elementSdk) {
      window.elementSdk.init({});
    }


    if (window.dataSdk) {
      window.dataSdk.init({});
    }


    const home = document.getElementById("home-screen");

    if (home) home.classList.remove("hidden");

  }


  /* ===== Placeholder Game Methods ===== */

  function startFlashcards() { console.log("flashcards"); }
  function startIRSGame() { console.log("irs"); }
  function startLightning() { console.log("lightning"); }
  function startQuiz() { console.log("quiz"); }
  function showProgress() { console.log("progress"); }

  </script>

</body>
</html>
