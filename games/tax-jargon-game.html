    .confetti { animation: confetti 3s ease-out forwards; }
    .drag-item { cursor: grab; touch-action: none; }
    .drag-item:active { cursor: grabbing; }
    .drop-zone { transition: all 0.2s ease; }
    .drop-zone.drag-over { background: rgba(59,130,246,0.08); border-color:#3b82f6; transform:scale(1.02); }
    .flip-card { perspective:1000px; }
    .flip-card-back { transform:rotateY(180deg); }
    .flip-card-front, .flip-card-back { backface-visibility:hidden; -webkit-backface-visibility:hidden; }
    .flip-card-inner { transition:transform 0.6s; transform-style:preserve-3d; }
    .flip-card.flipped .flip-card-inner { transform:rotateY(180deg); }
    .shake { animation:shake 0.3s ease-in-out; }

      100% { transform:scale(1); opacity:1; }

    @keyframes confetti {
      0% { transform:translateY(-100%) rotate(0deg); opacity:1; }

    }

    @keyframes pulse-glow {

      50% { box-shadow:0 0 40px rgba(34,197,94,0.45); }
    }

    @keyframes shake {
      0%,100% { transform:translateX(0); }
      25% { transform:translateX(-5px); }
      75% { transform:translateX(5px); }
    }

    .custom-scrollbar::-webkit-scrollbar {

      font-size: 15px;

  <script>

  /* ===== Required constants ===== */

  const API_BASE = "https://tools-api.taxmonitor.pro";
  const GAME_SLUG = "tax-jargon-game";
  const GAME_FILE = "tax-jargon-game.html";
  const ABOUT_URL = "/about-games/" + GAME_FILE;


  /* ===== Helpers ===== */

  function setStatus(message) {
    const el = document.getElementById("status");
    if (el) el.textContent = message || "";
  }


  async function safeJson(res) {
    try {
      const ct = (res.headers.get("content-type") || "").toLowerCase();
      if (!ct.includes("application/json")) return {};
      return await res.json();
    } catch {
      return {};
    }
  }


  async function apiGet(path) {
    const res = await fetch(API_BASE + path, {
      method: "GET",
      credentials: "include"
    });

    const json = await safeJson(res);

    return { res, json };
  }


  function redirectToAbout() {
    window.location.href = ABOUT_URL;
  }


  async function endRun(result) {
    await fetch(API_BASE + "/v1/games/end", {
      method: "POST",
      credentials: "include",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ result, slug: GAME_SLUG })
    }).catch(() => {});
  }


  /* ===== Access Gate ===== */

  async function gateAccess() {

    setStatus("Checking session…");

    const me = await apiGet("/v1/auth/me");

    if (!me.res.ok || !me.json || me.json.isAuthenticated === false) {
      redirectToAbout();
      return false;
    }


    setStatus("Loading token balance…");

    await apiGet("/v1/tokens/balance");


    setStatus("Verifying access…");

    const access = await apiGet("/v1/games/access?slug=" + encodeURIComponent(GAME_SLUG));

    if (!access.res.ok || !access.json || access.json.allowed !== true) {
      redirectToAbout();
      return false;
    }


    setStatus("Access granted.");

    window.__playerEmail = me.json.email || me.json.user?.email || "player";

    return true;
  }


  /* ===== Boot Sequence ===== */

  (async () => {

    const ok = await gateAccess();

    if (!ok) return;

    initializeApp();

  })().catch(() => {

    setStatus("Error loading game. Redirecting…");

    redirectToAbout();

  });


  /* ===== Minimal Game Initialization ===== */

  function initializeApp() {

    const email = window.__playerEmail || "player";

    const emailEl = document.getElementById("player-email");

    if (emailEl) emailEl.textContent = email;


    if (window.elementSdk) {
      window.elementSdk.init({});
    }


    if (window.dataSdk) {
      window.dataSdk.init({});
    }


    const home = document.getElementById("home-screen");

    if (home) home.classList.remove("hidden");

  }


  /* ===== Placeholder Game Methods ===== */

  function startFlashcards() { console.log("flashcards"); }
  function startIRSGame() { console.log("irs"); }
  function startLightning() { console.log("lightning"); }
  function startQuiz() { console.log("quiz"); }
  function showProgress() { console.log("progress"); }

  </script>
