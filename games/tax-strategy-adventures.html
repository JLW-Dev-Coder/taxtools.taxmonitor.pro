<!-- games/tax-strategy-adventures.html -->
<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tax Strategy Quest • Play • TaxTools Arcade</title>

  <!-- Canonical local assets (REQUIRED) -->
  <link rel="icon" href="/assets/favicon.ico" />
  <link rel="stylesheet" href="/styles/site.css" />

  <!-- SDKs (REQUIRED) -->
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>

  <!-- Optional remote assets -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }
    html, body { background: #020617; color: #fff; }
    body { font-family: 'Fredoka', sans-serif; }


    .game-bg {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      position: relative;
      overflow: hidden;
    }

    .pixelated {
      font-family: 'Press Start 2P', cursive;
      font-size: 0.75rem;
      letter-spacing: 2px;
    }

    .quest-title {
      font-family: 'Press Start 2P', cursive;
      font-size: 1.5rem;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #ec4899 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes pulse-indicator {
      0%, 100% {
        box-shadow: 0 0 12px rgba(16, 185, 129, 0.6), inset 0 0 6px rgba(255, 255, 255, 0.3);
      }
      50% {
        box-shadow: 0 0 20px rgba(16, 185, 129, 0.9), inset 0 0 8px rgba(255, 255, 255, 0.5);
      }
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 4px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.08) 0%, rgba(6, 182, 212, 0.08) 100%);
      border: 2px solid rgba(16, 185, 129, 0.35);
      border-radius: 14px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.1), inset 0 1px 2px rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    .status-badge:hover {
      border-color: rgba(16, 185, 129, 0.5);
      box-shadow: 0 6px 24px rgba(16, 185, 129, 0.15), inset 0 1px 3px rgba(255, 255, 255, 0.15);
    }

    .status-indicator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 12px;
      height: 12px;
      background: linear-gradient(135deg, #10b981, #06b6d4);
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(16, 185, 129, 0.6), inset 0 0 6px rgba(255, 255, 255, 0.3);
      animation: pulse-indicator 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .status-text {
      background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
    }
  </style>
</head>

<body class="h-full bg-slate-950 text-white">

  <!-- PARTIAL:header -->

  <!-- Required status element -->
  <div class="mx-auto max-w-6xl px-6 pt-4 pb-4 flex justify-center">
    <div class="status-badge">
      <span class="status-indicator" aria-hidden="true"></span>
      <span id="status" class="status-text">Checking access…</span>
    </div>
  </div>

  <!-- Required wrapper -->
  <div id="app" class="h-full w-full overflow-auto custom-scrollbar game-bg">

    <main class="px-6 py-10">
      <div class="max-w-5xl mx-auto text-center">

        <h1 class="quest-title text-4xl mb-6">Tax Strategy Quest</h1>

        <p class="text-slate-300 mb-8">Unlock powerful tax strategies and build your tax mastery.</p>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

          <button onclick="startZone('beginner')" class="p-6 bg-slate-800 rounded-lg hover:bg-slate-700">
            <div class="text-4xl mb-2">🌱</div>
            <div class="font-bold">Novice Zone</div>
          </button>

          <button onclick="startZone('intermediate')" class="p-6 bg-slate-800 rounded-lg hover:bg-slate-700">
            <div class="text-4xl mb-2">⚡</div>
            <div class="font-bold">Warrior Zone</div>
          </button>

          <button onclick="startZone('advanced')" class="p-6 bg-slate-800 rounded-lg hover:bg-slate-700">
            <div class="text-4xl mb-2">🔥</div>
            <div class="font-bold">Legend Zone</div>
          </button>

        </div>

      </div>
    </main>

  </div>

  <!-- PARTIAL:footer -->

<script>

/* ==========================
   Required constants
========================== */

const API_BASE = "https://tools-api.taxmonitor.pro";
const GAME_SLUG = "tax-strategy-adventures";
const GAME_FILE = "tax-strategy-adventures.html";
const ABOUT_URL = "/about-games/" + GAME_FILE;


/* ==========================
   Helper functions
========================== */

function setStatus(message) {
  const el = document.getElementById("status");
  if (el) el.textContent = message || "";
}

async function safeJson(res) {
  try {
    const ct = (res.headers.get("content-type") || "").toLowerCase();
    if (!ct.includes("application/json")) return {};
    return await res.json();
  } catch {
    return {};
  }
}

async function apiGet(path) {
  const res = await fetch(API_BASE + path, {
    method: "GET",
    credentials: "include"
  });

  const json = await safeJson(res);
  return { res, json };
}

function redirectToAbout() {
  window.location.href = ABOUT_URL;
}

async function endRun(result) {
  await fetch(API_BASE + "/v1/games/end", {
    method: "POST",
    credentials: "include",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({
      result,
      slug: GAME_SLUG
    })
  }).catch(() => {});
}


/* ==========================
   Access Gate
========================== */

async function gateAccess() {

  setStatus("Checking session…");

  const me = await apiGet("/v1/auth/me");

  if (!me.res.ok || !me.json || me.json.isAuthenticated === false) {
    redirectToAbout();
    return false;
  }


  setStatus("Loading token balance…");

  await apiGet("/v1/tokens/balance");


  setStatus("Verifying access…");

  const access = await apiGet("/v1/games/access?slug=" + encodeURIComponent(GAME_SLUG));

  if (!access.res.ok || !access.json || access.json.allowed !== true) {
    redirectToAbout();
    return false;
  }


  setStatus("Access granted.");

  return true;
}


/* ==========================
   Game placeholder
========================== */

function startZone(zone) {
  alert("Starting zone: " + zone);
}


async function initializeApp() {

  if (window.elementSdk) {
    await window.elementSdk.init({});
  }

  if (window.dataSdk) {
    await window.dataSdk.init({
      onDataChanged() {}
    });
  }

}


/* ==========================
   Boot sequence
========================== */

(async () => {

  const ok = await gateAccess();

  if (!ok) return;

  initializeApp();

})().catch(() => {

  setStatus("Error loading game. Redirecting…");

  redirectToAbout();

});

</script>

</body>
</html>
